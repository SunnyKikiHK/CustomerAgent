services:
  tool-gateway:
    build:
      context: ../..
      dockerfile: apps/tool_gateway/Dockerfile # dockfile's working directory based on context to build image
    image: customer-agent/tool-gateway:local 
    container_name: agent_tool_gateway
    environment:
      MCP_TOOL_GATEWAY_TOKEN: "${MCP_TOOL_GATEWAY_TOKEN:-}"
      MCP_GATEWAY_HOST: 0.0.0.0
      MCP_GATEWAY_PORT: "8002"
    ports:
      - "8002:8002"
    networks:
      - postgres_network
    restart: unless-stopped

  api-gateway:
    build:
      context: ../..
      dockerfile: apps/api_gateway/Dockerfile
    image: customer-agent/api-gateway:local
    container_name: agent_api_gateway
    environment:
      DATABASE_URL: postgresql://sunny:sunny@postgres:5432/agent
      REDIS_URL: redis://redis:6379/0
      MCP_TOOL_GATEWAY_URL: http://tool-gateway:8002/mcp
      MCP_TOOL_GATEWAY_TOKEN: "${MCP_TOOL_GATEWAY_TOKEN:-}"
      # LLM + embeddings: passed through from the host env / .env. When empty,
      # the app degrades to deterministic local embeddings.
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      OPENROUTER_BASE_URL: "${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}"
      OPENROUTER_MODEL: "${OPENROUTER_MODEL:-deepseek/deepseek-v4-flash}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-qwen/qwen3-embedding-8b}"
      CORS_ALLOW_ORIGINS: "*"
    ports:
      - "8000:8000"
    networks:
      - postgres_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  agent-worker:
    build:
      context: ../..
      dockerfile: apps/agent_service/Dockerfile
    image: customer-agent/agent-worker:local
    container_name: agent_worker
    environment:
      DATABASE_URL: postgresql://sunny:sunny@postgres:5432/agent
      REDIS_URL: redis://redis:6379/0
      MCP_TOOL_GATEWAY_URL: http://tool-gateway:8002/mcp
      MCP_TOOL_GATEWAY_TOKEN: "${MCP_TOOL_GATEWAY_TOKEN:-}"
      OPENROUTER_API_KEY: "${OPENROUTER_API_KEY:-}"
      OPENROUTER_BASE_URL: "${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}"
      OPENROUTER_MODEL: "${OPENROUTER_MODEL:-deepseek/deepseek-v4-flash}"
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-qwen/qwen3-embedding-8b}"
    networks:
      - postgres_network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg14
    container_name: agent_postgres
    environment:
      POSTGRES_USER: sunny
      POSTGRES_PASSWORD: sunny
      POSTGRES_DB: agent
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./packages/db/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - 5433:5432 # use 5433 as local also has a postgresql
    networks:
      - postgres_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sunny -d agent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  temporal:
    image: temporalio/auto-setup:1.24
    container_name: agent_temporal
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: sunny
      POSTGRES_PWD: sunny
      POSTGRES_SEEDS: agent_postgres
      DBNAME: temporal
      VISIBILITY_DBNAME: temporal_visibility
    ports:
      - "7233:7233"
    networks:
      - postgres_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "temporal --address \"$(hostname -i):7233\" operator namespace describe --namespace default >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

  redis:
    image: redis:7-alpine
    container_name: agent_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - postgres_network
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  langfuse-web:
    image: langfuse/langfuse:2
    container_name: agent_langfuse-web
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://sunny:sunny@postgres:5432/langfuse # production example: postgres://sunny:sunny@aws-db-instance.rds.amazonaws.com:5432/langfuse
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      SALT: "${SALT}"
      NEXTAUTH_URL: http://localhost:3000
      TELEMETRY_ENABLED: "false" # controls whether the application anonymously reports usage data back to the developers who built it
      HOSTNAME: "0.0.0.0" #explicitly overriding the HOSTNAME environment variable and setting it to 0.0.0.0 (the universal address for "listen to everything").
    networks:
      - postgres_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-S", "--spider", "http://127.0.0.1:3000/api/public/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  langfuse-worker:
    image: langfuse/langfuse-worker:2
    container_name: agent_langfuse-worker
    environment:
      DATABASE_URL: postgres://sunny:sunny@postgres:5432/langfuse
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      SALT: "${SALT}"
      TELEMETRY_ENABLED: "false"
    networks:
      - postgres_network
    depends_on:
      postgres:
        condition: service_healthy
      langfuse-web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:

networks:
  postgres_network:
