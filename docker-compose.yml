services:
  postgres:
    image: pgvector/pgvector:pg14
    environment:
      POSTGRES_USER: sunny
      POSTGRES_PASSWORD: sunny
      POSTGRES_DB: agent # db name
    volumes:
      - ./src/db/data:/var/lib/postgresql/data
      - ./src/db/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - 5432:5432
    networks:
      - postgres_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sunny -d agent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  temporal:
    image: temporalio/auto-setup:1.24 # dev only — not for production
    environment:
      - DB=postgres14
      - POSTGRES_USER=sunny
      - POSTGRES_PWD=sunny
      - POSTGRES_SEEDS=postgres # container name
    ports:
      - '7233:7233'
    networks:
      - postgres_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    networks:
      - redis_network
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data: # ???

networks:
  postgres_network:
  redis_network: